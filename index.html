<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robovian - Login</title>
    <meta name="description"
        content="Login to RoboTech to access your robotics projects, simulations, learning tools, and AI systems.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-container">
        <div class="glowing-orb orb-1"></div>
        <div class="glowing-orb orb-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="login-container">
        <div class="login-card">
            <div class="brand-section">
                <div class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#paint0_linear)" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M2 17L12 22L22 17" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M2 12L12 17L22 12" stroke="url(#paint2_linear)" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <defs>
                            <linearGradient id="paint0_linear" x1="12" y1="2" x2="12" y2="12"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#00F0FF" />
                                <stop offset="1" stop-color="#0057FF" />
                            </linearGradient>
                            <linearGradient id="paint1_linear" x1="12" y1="17" x2="12" y2="22"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#00F0FF" />
                                <stop offset="1" stop-color="#0057FF" />
                            </linearGradient>
                            <linearGradient id="paint2_linear" x1="12" y1="12" x2="12" y2="17"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#00F0FF" />
                                <stop offset="1" stop-color="#0057FF" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="app-name">Robovian</h1>
            </div>

            <div class="header-section">
                <h2 class="heading">Welcome Back</h2>
                <p class="subheading">Login to access your robotics projects, simulations, learning tools, and AI
                    systems.</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label for="fullname" class="visually-hidden">Full Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="fullname" placeholder="Enter your full name" required
                            autocomplete="name">
                        <div class="input-focus-border"></div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email" class="visually-hidden">Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                            </path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                        <div class="input-focus-border"></div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password" class="visually-hidden">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" placeholder="Enter your password" required
                            autocomplete="current-password">
                        <div class="input-focus-border"></div>
                        <button type="button" id="toggle-password" class="toggle-password-btn"
                            aria-label="Toggle password visibility">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="options-row">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember-me">
                        <span class="checkmark">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                                stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </span>
                        <span class="checkbox-text">Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="primary-btn">
                    <span class="btn-text">Login</span>
                    <div class="btn-glow"></div>
                </button>
            </form>

            <div class="bottom-section">
                <p class="bottom-line">Don't have an account? <a href="#" class="action-text">Sign Up</a></p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
