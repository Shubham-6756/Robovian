<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robovian - Learn Robotics</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="learn.css">
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- Background Effects -->
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="circuit-pattern"></div>
    </div>

    <!-- App Container -->
    <div class="app-container">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="logo-section">
                <a href="home.html" class="icon-btn" style="margin-right: 8px;">
                    <i data-lucide="arrow-left"></i>
                </a>
                <h1 class="app-title">Learn</h1>
            </div>
            <div class="header-actions">
                <button class="icon-btn" aria-label="Search">
                    <i data-lucide="search"></i>
                </button>
                <div class="profile-avatar">
                    <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Profile">
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content-scroll">
            <!-- Search Bar -->
            <section class="section-container">
                <div class="search-wrapper glass-panel">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="lessonSearch" placeholder="Search topics, sensors, code...">
                </div>
            </section>

            <!-- Continue Learning -->
            <section class="section-container">
                <div class="continue-card glass-panel" id="continueCard">
                    <div class="continue-info">
                        <span class="badge">Resume Learning</span>
                        <h3 id="lastLessonTitle">LED Basics</h3>
                        <div class="progress-mini">
                            <div class="progress-track">
                                <div class="progress-fill" style="width: 45%;"></div>
                            </div>
                            <span>45%</span>
                        </div>
                    </div>
                    <button class="play-btn"><i data-lucide="play"></i></button>
                </div>
            </section>

            <!-- Level Tabs -->
            <section class="section-container">
                <div class="tabs-container glass-panel">
                    <button class="tab-btn active" data-level="beginner">Beginner</button>
                    <button class="tab-btn" data-level="intermediate">Intermediate</button>
                    <button class="tab-btn" data-level="advanced">Advanced</button>
                </div>
            </section>

            <!-- Category Pills -->
            <section class="section-container">
                <div class="categories-scroll hide-scrollbar" id="categoryPills">
                    <div class="cat-pill active" data-category="All">All</div>
                    <div class="cat-pill" data-category="Basics">Basics</div>
                    <div class="cat-pill" data-category="Electronics">Electronics</div>
                    <div class="cat-pill" data-category="Arduino">Arduino</div>
                    <div class="cat-pill" data-category="Sensors">Sensors</div>
                    <div class="cat-pill" data-category="Motors">Motors</div>
                    <div class="cat-pill" data-category="Control">Control</div>
                    <div class="cat-pill" data-category="AI">AI</div>
                    <div class="cat-pill" data-category="Vision">Vision</div>
                    <div class="cat-pill" data-category="ROS">ROS</div>
                    <div class="cat-pill" data-category="Humanoid">Humanoid</div>
                </div>
            </section>

            <!-- Lesson Grid -->
            <section class="section-container">
                <div class="lesson-grid" id="lessonGrid">
                    <!-- Lessons will be injected here -->
                </div>
            </section>

            <!-- Daily Lesson -->
            <section class="section-container">
                <div class="daily-card glass-panel">
                    <div class="daily-header">
                        <div class="daily-icon"><i data-lucide="calendar"></i></div>
                        <h4>Daily Micro-Lesson</h4>
                    </div>
                    <p>Learn about **PWM (Pulse Width Modulation)** in 2 minutes.</p>
                    <button class="btn-small">Start Now</button>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass-panel">
            <a href="home.html" class="nav-item">
                <i data-lucide="home"></i>
                <span>Home</span>
            </a>
            <a href="learn.html" class="nav-item active">
                <i data-lucide="book-open"></i>
                <span>Learn</span>
            </a>
            <a href="projects.html" class="nav-item">
                <i data-lucide="folder-grid"></i>
                <span>Projects</span>
            </a>
            <a href="robogenie.html" class="nav-item">
                <i data-lucide="bot"></i>
                <span>RoboGenie</span>
            </a>
            <a href="#" class="nav-item">
                <i data-lucide="user"></i>
                <span>Profile</span>
            </a>
        </nav>

        <!-- Floating AI Button -->
        <a href="robogenie.html" class="floating-ai-btn" style="padding: 2px;">
            <img src="assets/robogenie_logo.png" alt="RoboGenie" style="width: 100%; height: 100%; border-radius: 50%;">
        </a>
    </div>

    <!-- Lesson Detail Modal -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="lesson-modal" id="lessonModal">
        <div class="modal-header">
            <button class="close-modal" id="closeModal"><i data-lucide="x"></i></button>
            <div class="modal-tabs">
                <button class="modal-tab active" data-view="learn">Learn</button>
                <button class="modal-tab" data-view="quiz">Quiz</button>
            </div>
        </div>
        
        <div class="modal-content" id="modalContent">
            <!-- Content injected by JS -->
        </div>

        <div class="modal-footer">
            <button class="btn btn-secondary" id="askGenieBtn">
                <i data-lucide="message-square"></i> Ask RoboGenie
            </button>
            <button class="btn btn-primary" id="nextActionBtn">Next Action</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="learn-data.js"></script>
    <script src="learn.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
