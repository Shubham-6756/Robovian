<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Robotics Syllabus - Robovian</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    
    <!-- Component-specific CSS for Syllabus -->
    <style>
        .syllabus-container {
            padding: 20px;
            padding-bottom: 100px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .phase-card {
            background: rgba(16, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .phase-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }
        
        .phase-header:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .phase-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--primary-light);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .phase-icon {
            color: var(--primary);
        }
        
        .phase-toggle {
            transition: transform 0.3s ease;
            color: var(--text-muted);
        }
        
        .phase-card.active .phase-toggle {
            transform: rotate(180deg);
        }
        
        .phase-body {
            display: none;
            padding: 0 20px 20px 20px;
        }
        
        .phase-card.active .phase-body {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        
        .category-section {
            margin-top: 16px;
        }
        
        .category-title {
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 8px;
            font-weight: 500;
            border-left: 3px solid var(--primary);
            padding-left: 8px;
        }
        
        .item-list {
            list-style: none;
            padding-left: 10px;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }
        
        .item-list li {
            position: relative;
            padding-left: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.4;
        }
        
        .item-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary-light);
            opacity: 0.6;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Search bar styles */
        .search-box {
            margin-bottom: 24px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            background: rgba(16, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
    </style>
    
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="circuit-pattern"></div>
    </div>

    <div class="app-container">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="logo-section">
                <button class="icon-btn" aria-label="Back" onclick="window.location.href='home.html'" style="margin-right: 12px; font-size: 1.2rem;">
                    <i data-lucide="arrow-left"></i>
                </button>
                <h1 class="app-title" style="font-size: 1.2rem; align-items: center; display: flex; gap: 8px;">
                    <i data-lucide="graduation-cap" style="color: var(--primary);"></i>
                    Full Syllabus
                </h1>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content-scroll" style="padding-top: 80px;">
            <div class="syllabus-container">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="syllabusSearch" placeholder="Search topics, skills, phases...">
                </div>
                
                <div id="syllabusContainer">
                    <!-- Phases will be injected here by syllabus.js -->
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        lucide.createIcons();
    </script>
    <script src="syllabus_data.js"></script>
    <script src="syllabus.js"></script>
</body>

</html>
